name: Dependency Submission

on:
  schedule:
    - cron: '0 3 * * 1'          # 03:00 UTC every Monday — runs before Dependabot (03:30)
  push:
    branches: [master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'deploy/package.json'
  pull_request:
    branches: [master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'deploy/package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit-npm-root:
    name: Submit npm (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: advanced-security/npm-dependency-submission-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  submit-npm-deploy:
    name: Submit npm (deploy/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      # No lock file in deploy/ — generate one without installing node_modules
      - run: npm install --package-lock-only
        working-directory: deploy
      - uses: advanced-security/npm-dependency-submission-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          directory: ./deploy
